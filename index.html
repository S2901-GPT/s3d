<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>S3D AI Builder</title><style>:root{--bg:#050507;--panel:#101014;--card:#16161a;--muted:#a1a1aa;--text:#fff;--line:#2f2f35;--brand:#0a84ff;--ok:#22c55e;--bad:#ef4444}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Tahoma,sans-serif;background:var(--bg);color:var(--text)}button,input,textarea{font:inherit}.app{min-height:100vh;display:grid;grid-template-columns:300px 1fr 360px}.side,.props{background:var(--panel);border-inline-start:1px solid #27272a;padding:18px;overflow:auto}.props{border-inline:1px solid #27272a 0}.brand{font-weight:900;font-size:22px}.muted,.small{color:var(--muted);font-size:13px;line-height:1.7}.btn{width:100%;border:0;border-radius:16px;padding:13px;margin-top:10px;background:#f5f5f7;color:#000;font-weight:800;cursor:pointer}.btn2{background:#232329;color:#fff;border:1px solid #3f3f46}.danger{background:#7f1d1d;color:#fee2e2}.group{margin-top:18px}.blockBtn,.quick button{display:flex;justify-content:space-between;align-items:center;background:#18181b;border:1px solid var(--line);color:#fff;border-radius:16px;padding:13px;margin-top:8px;cursor:pointer}.canvasWrap{height:100vh;overflow:auto;background:radial-gradient(circle at top,#1f2937,#020617 55%);padding:28px;display:flex;justify-content:center}.canvas{width:min(430px,100%);min-height:100%;background:#0b0b0f;border-radius:36px;padding:18px;color:#fff;box-shadow:0 40px 120px #000}.section{position:relative;border:1px solid transparent;border-radius:26px;margin:14px 0;padding:18px;background:var(--card);cursor:grab}.section.selected,.section.s3d-selected{border-color:var(--brand);box-shadow:0 0 0 3px #0a84ff44}.edit-mode .section{cursor:pointer}.hero{background:linear-gradient(145deg,#111827,#3b2f7a,#0a84ff);padding:30px}.hero h1{font-size:34px;margin:0 0 12px}.text h2,.image h2,.cards h2,.steps h2,.define h2,.choice h2{margin:0 0 10px}.text p,.hero p,.cards p,.steps p{color:#d1d5db;line-height:1.8}</style></head><body>

<div id="status" class="status" style="display:none">جاهز</div>

<script>

async function aiChat(mobile){
  const input=document.getElementById(mobile?'aiEditMobile':'aiEdit');
  const msg=input.value.trim();
  if(!msg)return;

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:msg})
    });

    const text = await res.text();
    const trimmed = text.trim();

    // 🔴 أهم تعديل: HTML أولاً
    if (
      trimmed.startsWith("<!DOCTYPE html>") ||
      trimmed.startsWith("<html")
    ) {
      document.open();
      document.write(trimmed);
      document.close();
      return;
    }

    // تنظيف JSON
    const clean = trimmed
      .replace(/```json/g, "")
      .replace(/```/g, "")
      .trim();

    let data;

    try {
      data = JSON.parse(clean);
    } catch (e) {
      console.error("JSON parse failed:", clean);
      return;
    }

    if (data.tool) {
      await executeTool(data.tool);
    }

  }catch(e){
    console.error(e);
  }
}

</script>

</body></html>
