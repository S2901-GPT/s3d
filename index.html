<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S3D Interactive Screen Builder</title><style>*{box-sizing:border-box}body{margin:0;font-family:Inter,Tahoma,Arial;background:radial-gradient(circle at top,#1e293b,#020617 60%);color:#fff}.wrap{min-height:100vh;display:grid;grid-template-columns:410px 1fr;gap:24px;padding:24px}.panel{background:rgba(15,23,42,.78);backdrop-filter:blur(18px);border:1px solid rgba(148,163,184,.22);border-radius:28px;padding:22px;box-shadow:0 28px 90px #0008}h1{margin:0 0 8px;font-size:25px;letter-spacing:-.5px}.brand{display:inline-flex;gap:8px;align-items:center;background:#0ea5e933;color:#bae6fd;border:1px solid #38bdf855;padding:8px 12px;border-radius:999px;font-size:12px;margin-bottom:12px}textarea,button{width:100%;margin-top:12px;padding:15px;border-radius:18px;border:1px solid #334155;background:#020617;color:#fff}textarea{height:180px;line-height:1.9;font-size:14px;resize:vertical}button{background:linear-gradient(135deg,#0ea5e9,#2563eb);font-weight:800;cursor:pointer;box-shadow:0 14px 34px #0284c744}.secondary{background:#1e293b;box-shadow:none}.hint{color:#94a3b8;font-size:13px;line-height:1.9}.phoneFrame{display:grid;place-items:center}.phone{width:390px;max-width:94vw;height:820px;background:linear-gradient(180deg,#f8fafc,#eef2f7);color:#0f172a;border:14px solid #020617;border-radius:52px;margin:auto;padding:28px 16px 20px;overflow:auto;box-shadow:0 38px 110px #000b;position:relative}.phone:before{content:"";display:block;width:118px;height:26px;background:#020617;border-radius:0 0 18px 18px;margin:-28px auto 16px}.block{margin:14px 0;border-radius:28px}.hero{padding:26px;background:linear-gradient(145deg,#0f172a,#1e3a8a 55%,#0ea5e9);color:#fff;box-shadow:0 24px 50px #0ea5e955;overflow:hidden;position:relative}.hero:after{content:"";position:absolute;width:170px;height:170px;border-radius:50%;background:#ffffff22;left:-50px;top:-60px}.hero h2{margin:0 0 10px;font-size:27px;line-height:1.35;position:relative}.hero p{margin:0;line-height:1.9;color:#dbeafe;position:relative}.card,.tabBox,.accBox,.stepBox,.quizBox{padding:18px;background:rgba(255,255,255,.92);border:1px solid #e2e8f0;box-shadow:0 18px 38px #0f172a14}.card b,.tabBox>b,.accBox>b,.stepBox>b,.quizBox>b{display:block;font-size:18px;margin-bottom:12px;color:#0f172a}.card p{margin:0;line-height:1.9;color:#475569}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px;padding-bottom:4px}.tab{border:0;background:#e2e8f0;color:#0f172a;padding:10px 14px;border-radius:999px;white-space:nowrap;box-shadow:none;margin:0;width:auto}.tab.active{background:#0f172a;color:#fff}.tabContent{background:linear-gradient(180deg,#f8fafc,#eef2ff);padding:16px;border-radius:20px;line-height:1.9;color:#334155}.accItem{margin:10px 0}.accHead{width:100%;background:#f1f5f9;color:#0f172a;text-align:right;border:0;padding:14px;border-radius:18px;margin:0;box-shadow:none}.accBody{display:none;background:#fff;padding:14px;line-height:1.9;color:#475569;border-right:4px solid #0ea5e9;border-radius:16px;margin-top:8px}.accItem.open .accBody{display:block}.step{display:none}.step.active{display:block;background:#eff6ff;padding:18px;border-radius:22px;line-height:1.9;color:#1e293b}.stepControls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stepControls button,.quizOpt{margin-top:10px;padding:13px;border-radius:16px;border:0;box-shadow:none}.quizOpt{background:#f1f5f9;color:#111827;text-align:right}.quizOpt.good{background:#bbf7d0}.quizOpt.bad{background:#fecaca}.nav{position:sticky;bottom:0;background:#0f172a;color:#fff;display:flex;justify-content:space-around;padding:14px;border-radius:24px;box-shadow:0 20px 40px #0004}.linkbox{background:#020617;border:1px solid #334155;border-radius:18px;padding:14px;margin-top:12px;word-break:break-all;color:#bae6fd}.selected{outline:3px solid #38bdf8}.error{background:#fee2e2;color:#991b1b;padding:14px;border-radius:18px}@media(max-width:900px){.wrap{grid-template-columns:1fr;padding:14px}.phone{height:720px}.panel{order:2}.phoneFrame{order:1}}</style></head><body><div class="wrap"><section class="panel"><span class="brand">S3D · Interactive AI</span><h1>منشئ شاشة تفاعلية</h1><p class="hint">اكتب موضوع الشاشة والمحتوى المطلوب. النظام يصمم تجربة جوال تفاعلية، وليس صفحة بيع.</p><textarea id="input" placeholder="مثال: شرح متلازمة أسبرجر، الأعراض، طرق التعامل، أسئلة شائعة، خطوات، اختبار بسيط"></textarea><button onclick="build()">إنشاء شاشة تفاعلية</button><button class="secondary" onclick="publishPage()">نشر رابط عرض فقط</button><button class="secondary" onclick="downloadHtml()">تحميل HTML</button><div id="published" class="linkbox" style="display:none"></div><p class="hint">اضغط عنصرًا داخل الجوال لتعديل نصه.</p><textarea id="editor" placeholder="اختر عنصرًا لتعديله" oninput="editSelected()"></textarea></section><section class="phoneFrame"><div class="phone" id="screen"><div class="hero block"><h2>جاهز للتصميم</h2><p>اكتب المحتوى واضغط إنشاء شاشة تفاعلية.</p></div><div class="card block"><b>تجربة تفاعلية</b><p>تبويبات، أسئلة قابلة للفتح، خطوات، واختبار بسيط داخل شاشة واحدة.</p></div></div></section></div><script>let selected=null;const screenEl=document.getElementById('screen'),inputEl=document.getElementById('input'),editorEl=document.getElementById('editor'),publishedEl=document.getElementById('published');function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function splitItems(s){return String(s||'').split('|').map(x=>x.trim()).filter(Boolean)}function bind(){document.querySelectorAll('.block').forEach(b=>{b.onclick=function(e){if(e.target.closest('button'))return;e.stopPropagation();document.querySelectorAll('.block').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=b;editorEl.value=b.innerText.trim()}})}function editSelected(){if(selected&&!selected.classList.contains('tabBox')&&!selected.classList.contains('accBox')&&!selected.classList.contains('stepBox')&&!selected.classList.contains('quizBox'))selected.innerHTML=safe(editorEl.value).replace(/\n/g,'<br>')}function renderBlock(b,i){let type=b.type||'info',title=safe(b.title||''),content=safe(b.content||''),items=splitItems(b.items);if(type==='hero')return `<div class="block hero"><h2>${title||content}</h2><p>${safe(b.subtitle||'')}</p></div>`;if(type==='tabs')return `<div class="block tabBox"><b>${title||'الأقسام'}</b><div class="tabs">${items.map((x,j)=>`<button class="tab ${j==0?'active':''}" onclick="openTab(this,'tab${i}_${j}')">${safe(x)}</button>`).join('')}</div>${items.map((x,j)=>`<div id="tab${i}_${j}" class="tabContent" style="display:${j==0?'block':'none'}">${safe(x)}: محتوى تفاعلي قابل للقراءة.</div>`).join('')}</div>`;if(type==='accordion')return `<div class="block accBox"><b>${title||'الأسئلة'}</b>${items.map(x=>{let p=x.split(':');return `<div class="accItem"><button class="accHead" onclick="this.parentElement.classList.toggle('open')">${safe(p[0])}</button><div class="accBody">${safe(p.slice(1).join(':')||'تفاصيل إضافية')}</div></div>`}).join('')}</div>`;if(type==='steps')return `<div class="block stepBox"><b>${title||'الخطوات'}</b>${items.map((x,j)=>`<div class="step ${j==0?'active':''}">${j+1}. ${safe(x)}</div>`).join('')}<div class="stepControls"><button onclick="moveStep(this,-1)">السابق</button><button onclick="moveStep(this,1)">التالي</button></div></div>`;if(type==='quiz')return `<div class="block quizBox"><b>${title||'اختبار'}</b><p>${safe(items[0]||content||'اختر الإجابة')}</p>${items.slice(1,3).map((x,j)=>`<button class="quizOpt" onclick="this.classList.add(${j==0?'\'good\'':'\'bad\''})">${safe(x)}</button>`).join('')}</div>`;if(type==='nav')return `<div class="block nav">${items.map(x=>`<span>${safe(x)}</span>`).join('')}</div>`;return `<div class="block card"><b>${title||content}</b><p>${safe(b.text||b.subtitle||'')}</p></div>`}function openTab(btn,id){let box=btn.closest('.tabBox');box.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));box.querySelectorAll('.tabContent').forEach(x=>x.style.display='none');btn.classList.add('active');document.getElementById(id).style.display='block'}function moveStep(btn,dir){let box=btn.closest('.stepBox'),steps=[...box.querySelectorAll('.step')],i=steps.findIndex(s=>s.classList.contains('active'));steps[i].classList.remove('active');steps[(i+dir+steps.length)%steps.length].classList.add('active')}function fallback(){return [{type:'hero',title:'شاشة تفاعلية',subtitle:inputEl.value||'محتوى معلوماتي'}, {type:'tabs',title:'الأقسام',items:'نظرة عامة|التفاصيل|ملاحظات'}, {type:'accordion',title:'أسئلة شائعة',items:'ما الفكرة؟:عرض معلومات بشكل تفاعلي|كيف أستخدمها؟:اضغط على التبويبات والأسئلة'}, {type:'steps',title:'الخطوات',items:'اقرأ المقدمة|افتح الأقسام|اختبر معلوماتك'}, {type:'quiz',title:'اختبار سريع',items:'هل هذه شاشة تفاعلية؟|نعم|لا|نعم'}, {type:'nav',items:'الرئيسية|الأقسام|الأسئلة'}]}async function build(){screenEl.innerHTML='<div class="block card"><b>جاري الإنشاء...</b><p>يتم بناء شاشة تفاعلية.</p></div>';try{let res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:inputEl.value})});let data=await res.json();if(!res.ok||data.error)throw new Error(data.error||'AI error');let blocks=data.blocks&&data.blocks.length?data.blocks:fallback();screenEl.innerHTML=blocks.map(renderBlock).join('');bind()}catch(e){let blocks=fallback();screenEl.innerHTML=blocks.map(renderBlock).join('')+'<div class="error">تنبيه: تم إنشاء نموذج محلي لأن API لم يستجب: '+safe(e.message)+'</div>';bind()}}function publishPage(){let code=btoa(unescape(encodeURIComponent(screenEl.innerHTML)));let url=location.origin+'/view.html#'+code;publishedEl.style.display='block';publishedEl.innerHTML='رابط الزوار:<br><a style="color:#bae6fd" href="'+url+'" target="_blank">'+url+'</a>';navigator.clipboard&&navigator.clipboard.writeText(url)}function downloadHtml(){let html='<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><body>'+screenEl.innerHTML+'</body></html>';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='interactive-screen.html';a.click()}bind()</script></body></html>
