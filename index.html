id="chatLogMobile" class="chatLog"><div class="chatMsg ai">جاهز.</div></div><div class="field"><textarea id="aiEditMobile" placeholder="اكتب طلبك"></textarea></div><button class="btn" onclick="aiChat(true)">إرسال</button></section><script>let blocks=[{id:uid(),type:'hero',title:'صفحة تفاعلية',text:'اضغط على العناصر داخل الصفحة لاكتشاف المعلومات.'},{id:uid(),type:'define',title:'مصطلحات تفاعلية',items:'المفهوم:شرح مختصر للمفهوم|السبب:تفسير السبب بطريقة مبسطة|النتيجة:ماذا يحدث بعد ذلك'}],selected=null,dragId=null,editMode=false,historyStack=[],redoStack=[],previewSnapshot=null,recentActions=[];const canvas=document.getElementById('canvas'),props=document.getElementById('props'),published=document.getElementById('published'),chatLog=document.getElementById('chatLog'),chatLogMobile=document.getElementById('chatLogMobile'),statusEl=document.getElementById('status');const TOOL_NAMES=['update_text','update_style','create_component','delete_component','reorder_layout','highlight_element','preview_change','apply_change','reset_section','replace_text','append_text','update_typography','update_spacing','apply_theme','duplicate_component','move_component','create_section','split_section','merge_sections','add_button','add_link','scroll_to_element','focus_element','batch_update','validate_selector','get_selected_element_info','get_dom_summary','save_snapshot','restore_snapshot'];function uid(){return 'b'+Math.random().toString(36).slice(2,9)}function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function cleanHtml(s){return String(s||'').replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi,'').replace(/on\w+\s*=/gi,'data-blocked=')}function setStatus(t){statusEl.textContent=t;statusEl.style.display='block';clearTimeout(setStatus.t);setStatus.t=setTimeout(()=>statusEl.style.display='none',2200)}function log(x){console.log('[S3D]',x)}function snapshot(){return JSON.stringify(blocks)}function saveSnapshot(label){historyStack.push(snapshot());if(historyStack.length>30)historyStack.shift();redoStack=[];if(label)recentActions.unshift(label);recentActions=recentActions.slice(0,10)}function restore(s){blocks=JSON.parse(s);render();renderProps()}function undo(){if(!historyStack.length)return setStatus('لا يوجد Undo');redoStack.push(snapshot());restore(historyStack.pop());setStatus('تم الرجوع')}function redo(){if(!redoStack.length)return setStatus('لا يوجد Redo');historyStack.push(snapshot());restore(redoStack.pop());setStatus('تمت الإعادة')}function addChat(t,ai){[chatLog,chatLogMobile].forEach(el=>{if(!el)return;el.innerHTML+='<div class="chatMsg '+(ai?'ai':'')+'">'+safe(t)+'</div>';el.scrollTop=el.scrollHeight})}function toggleSheet(){document.getElementById('sheet').classList.toggle('open')}function quick(t){document.getElementById('aiEditMobile').value=t;aiChat(true)}function toggleEditMode(){editMode=!editMode;document.body.classList.toggle('edit-mode',editMode);setStatus(editMode?'Edit Mode فعال':'Edit Mode متوقف')}function addBlock(type){saveSnapshot('addBlock');blocks.push(defaultBlock(type));selected=blocks[blocks.length-1].id;render();renderProps();setStatus('تمت إضافة عنصر')}function defaultBlock(type){const b={id:uid(),type,title:'عنوان',text:'محتوى'};if(type==='hero'){b.title='عنوان رئيسي';b.text='وصف جذاب ومختصر'}if(type==='cards'){b.title='بطاقات معلومات';b.items='بطاقة أولى:شرح مختصر|بطاقة ثانية:شرح مختصر|بطاقة ثالثة:شرح مختصر'}if(type==='steps'){b.title='خطوات';b.items='الخطوة الأولى|الخطوة الثانية|الخطوة الثالثة'}if(type==='image'){b.title='غلاف بصري';b.text='اضغط العنصر ثم ارفع صورة من الخصائص'}if(type==='define'){b.title='كلمات اضغط عليها';b.items='كلمة أولى:تعريف الكلمة الأولى|كلمة ثانية:تعريف الكلمة الثانية|كلمة ثالثة:تعريف الكلمة الثالثة'}if(type==='choice'){b.title='اختر ما تريد معرفة المزيد عنه';b.items='الخيار الأول:شرح يظهر عند الضغط|الخيار الثاني:شرح آخر يظهر عند الضغط|الخيار الثالث:تفاصيل إضافية'}return b}function render(){canvas.innerHTML=blocks.map(blockHtml).join('');bind();updateSelectedLabels()}function blockHtml(b){const sel=b.id===selected?' selected s3d-selected':'';const a=`draggable="true" data-id="${b.id}" data-s3d-id="${b.id}"`;if(b.type==='hero')return `<div class="section hero${sel}" ${a}><h1>${safe(b.title)}</h1><p>${safe(b.text)}</p></div>`;if(b.type==='define')return `<div class="section define${sel}" ${a}><h2>${safe(b.title)}</h2><div>${String(b.items||'').split('|').map((x,i)=>{let p=x.split(':');return `<span class="term" onclick="showDef(this,'${b.id}_${i}')">${safe(p[0])}</span>`}).join('')}</div>${String(b.items||'').split('|').map((x,i)=>{let p=x.split(':');return `<div id="${b.id}_${i}" class="definition">${safe(p.slice(1).join(':')||'تعريف غير مضاف')}</div>`}).join('')}</div>`;if(b.type==='choice')return `<div class="section choice${sel}" ${a}><h2>${safe(b.title)}</h2><div class="choiceGrid">${String(b.items||'').split('|').map((x,i)=>{let p=x.split(':');return `<button class="choiceBtn" onclick="showChoice(this,'${b.id}_c${i}')">${safe(p[0])}</button>`}).join('')}</div>${String(b.items||'').split('|').map((x,i)=>{let p=x.split(':');return `<div id="${b.id}_c${i}" class="choicePanel">${safe(p.slice(1).join(':')||'تفاصيل غير مضافة')}</div>`}).join('')}</div>`;if(b.type==='cards')return `<div class="section cards${sel}" ${a}><h2>${safe(b.title)}</h2><div class="cardsGrid">${String(b.items||'').split('|').map(x=>{let p=x.split(':');return `<div class="card"><b>${safe(p[0])}</b><p>${safe(p.slice(1).join(':'))}</p></div>`}).join('')}</div></div>`;if(b.type==='steps')return `<div class="section steps${sel}" ${a}><h2>${safe(b.title)}</h2><div class="stepsList">${String(b.items||'').split('|').map((x,i)=>`<div class="step">${i+1}. ${safe(x)}</div>`).join('')}</div></div>`;if(b.type==='image')return `<div class="section image${sel}" ${a}><h2>${safe(b.title)}</h2><div class="imageBox">${String(b.image||'').startsWith('data:image')?`<img loading="lazy" src="${b.image}">`:safe(b.text||'ارفع صورة')}</div></div>`;return `<div class="section text${sel}" ${a}><h2>${safe(b.title)}</h2><p>${safe(b.text)}</p></div>`}function bind(){document.querySelectorAll('.section').forEach(el=>{el.onclick=e=>{if(editMode){e.preventDefault();e.stopPropagation()}if(e.target.closest('.term,.choiceBtn')&&!editMode)return;selectBlock(el.dataset.id)};el.ondragstart=()=>{dragId=el.dataset.id};el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();moveBlock(dragId,el.dataset.id)}})}function selectorForSelected(){return selected?`.section[data-s3d-id="${selected}"]`:''}function getBySelector(sel){if(!sel)return selected?document.querySelector(selectorForSelected()):null;if(['html','head','body','script'].includes(String(sel).trim().toLowerCase()))return null;return document.querySelector(sel)}function blockBySelector(sel){const el=getBySelector(sel);return el?blocks.find(b=>b.id===el.dataset.id):null}function selectBlock(id){selected=id;render();renderProps();setStatus('تم اختيار العنصر')}function updateSelectedLabels(){const txt=selected?'العنصر المحدد: '+selectorForSelected():'لا يوجد عنصر محدد.';(document.getElementById('selectedLabel')||{}).textContent=txt;(document.getElementById('mobileSelected')||{}).textContent=txt}function renderProps(){const b=blocks.find(x=>x.id===selected);if(!b){props.innerHTML='<p class="muted">لا يوجد عنصر محدد.</p>';updateSelectedLabels();return}props.innerHTML=`<div class="field"><label>النوع</label><input value="${safe(b.type)}" disabled></div><div class="field"><label>العنوان</label><input value="${safe(b.title)}" oninput="updateProp('title',this.value)"></div><div class="field"><label>النص</label><textarea oninput="updateProp('text',this.value)">${safe(b.text)}</textarea></div>${(b.type==='cards'||b.type==='steps'||b.type==='define'||b.type==='choice')?`<div class="field"><label>العناصر</label><textarea oninput="updateProp('items',this.value)">${safe(b.items)}</textarea></div>`:''}${b.type==='image'?`<div class="field"><label>رفع صورة</label><input type="file" accept="image/*" onchange="uploadImage(event)"></div>`:''}<div class="toolbar"><button class="btn btn2" onclick="duplicateBlock()">نسخ</button><button class="btn danger" onclick="deleteBlock()">حذف</button></div>`;updateSelectedLabels()}function updateProp(k,v){const b=blocks.find(x=>x.id===selected);if(b){b[k]=v;render()}}function uploadImage(e){const file=e.target.files&&e.target.files[0];if(!file||!selected)return;const b=blocks.find(x=>x.id===selected);const img=new Image(),r=new FileReader();r.onload=()=>{img.onload=()=>{const c=document.createElement('canvas'),max=1200,scale=Math.min(1,max/Math.max(img.width,img.height));c.width=img.width*scale;c.height=img.height*scale;c.getContext('2d').drawImage(img,0,0,c.width,c.height);saveSnapshot('uploadImage');b.image=c.toDataURL('image/jpeg',.78);b.text='';render();renderProps();setStatus('تم تجهيز الصورة')};img.src=r.result};r.readAsDataURL(file)}function deleteBlock(){if(!selected)return;saveSnapshot('delete');blocks=blocks.filter(x=>x.id!==selected);selected=null;render();renderProps()}function duplicateBlock(){const b=blocks.find(x=>x.id===selected);if(b){saveSnapshot('duplicate');blocks.push({...b,id:uid(),title:b.title+' نسخة'});render()}}function moveBlock(from,to){if(!from||!to||from===to)return;saveSnapshot('move');const a=blocks.findIndex(x=>x.id===from),b=blocks.findIndex(x=>x.id===to);const item=blocks.splice(a,1)[0];blocks.splice(b,0,item);render()}function showDef(el,id){document.querySelectorAll('.definition').forEach(x=>x.classList.remove('show'));document.getElementById(id).classList.add('show')}function showChoice(el,id){let box=el.closest('.choice');box.querySelectorAll('.choicePanel').forEach(x=>x.classList.remove('show'));document.getElementById(id).classList.add('show')}function domSummary(){return {sections:blocks.map((b,i)=>({index:i,selector:`.section[data-s3d-id="${b.id}"]`,type:b.type,title:b.title,text:String(b.text||b.items||'').slice(0,140)})),selectedSelector:selectorForSelected(),selectedElementInfo:selectedInfo(),count:blocks.length,colors:['#0a84ff','#16161a','#0b0b0f']}}function selectedInfo(){const b=blocks.find(x=>x.id===selected);return b?{id:b.id,type:b.type,title:b.title,text:String(b.text||b.items||'').slice(0,180),selector:selectorForSelected()}:null}async function aiChat(mobile){const input=document.getElementById(mobile?'aiEditMobile':'aiEdit');const msg=input.value.trim();if(!msg)return;addChat(msg,false);setStatus('AI يفكر...');addChat('AI يفكر...',true);try{const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,selectedSelector:selectorForSelected(),domSummary:domSummary(),currentMode:editMode?'edit':'view',selectedElementInfo:selectedInfo(),recentActions,pageGoal:'Mobile-first RTL SaaS page builder',deviceMode:'mobile',publicViewProtected:true})});const data=await res.json();if(data.error)throw new Error(data.error);if(data.tool){setStatus('يتم تطبيق التعديل...');const r=await executeTool(data.tool);addChat((data.reply||'')+' — '+r.message,true);setStatus(r.success?'تم التعديل':'فشل التنفيذ')}else addChat(data.reply||'تم',true);input.value=''}catch(e){console.error(e);addChat('فشل التنفيذ: '+e.message,true);setStatus('فشل التنفيذ')}}async function executeTool(tool){try{log({tool});if(!tool||!tool.name)return {success:false,error:'missing_tool',message:'لا توجد أداة'};if(!TOOL_NAMES.includes(tool.name))return {success:false,error:'unknown_tool',message:'أداة غير معروفة'};const p=tool.params||{};let b,sel=p.selector||selectorForSelected();if(tool.name!=='batch_update'&&!['get_dom_summary','get_selected_element_info','save_snapshot','restore_snapshot','apply_change'].includes(tool.name))saveSnapshot(tool.name);switch(tool.name){case'validate_selector':return {success:!!getBySelector(sel),message:getBySelector(sel)?'selector صالح':'لم أجد العنصر، اختره من الصفحة ثم أعد الطلب.'};case'get_selected_element_info':return {success:true,message:JSON.stringify(selectedInfo())};case'get_dom_summary':return {success:true,message:JSON.stringify(domSummary())};case'save_snapshot':saveSnapshot('manual');return {success:true,message:'تم حفظ snapshot'};case'restore_snapshot':if(historyStack.length)restore(historyStack.pop());return {success:true,message:'تمت الاستعادة'};case'update_text':case'replace_text':b=blockBySelector(sel);if(!b)return failSel();if(p.title)b.title=cleanHtml(p.title);if(p.text!==undefined)b.text=cleanHtml(p.text);render();renderProps();return ok('تم تحديث النص');case'append_text':b=blockBySelector(sel);if(!b)return failSel();b.text=(b.text||'')+' '+cleanHtml(p.text||'');render();return ok('تمت إضافة النص');case'update_style':case'update_typography':case'update_spacing':b=blockBySelector(sel);if(!b)return failSel();b.style=Object.assign({},b.style||{},p.styles||p);applyInlineStyle(b);render();return ok('تم تحديث النمط');case'apply_theme':document.documentElement.style.setProperty('--brand',p.brand||p.primary||'#0a84ff');document.documentElement.style.setProperty('--card',p.card||'#16161a');return ok('تم تطبيق الثيم');case'create_component':case'create_section':blocks.push(defaultBlock(p.type||'text'));selected=blocks[blocks.length-1].id;render();renderProps();return ok('تمت إضافة قسم');case'add_button':b=blockBySelector(sel);if(!b)return failSel();b.items=(b.items?b.items+'|':'')+(p.label||'زر')+':'+(p.url||'#');b.type='choice';render();return ok('تمت إضافة زر');case'add_link':b=blockBySelector(sel);if(!b)return failSel();b.text=(b.text||'')+' '+(p.label||'رابط')+': '+(p.url||'#');render();return ok('تمت إضافة رابط');case'delete_component':b=blockBySelector(sel);if(!b)return failSel();blocks=blocks.filter(x=>x.id!==b.id);selected=null;render();renderProps();return ok('تم الحذف');case'duplicate_component':b=blockBySelector(sel);if(!b)return failSel();blocks.push({...b,id:uid(),title:b.title+' نسخة'});render();return ok('تم النسخ');case'move_component':case'reorder_layout':b=blockBySelector(sel);if(!b)return failSel();let i=blocks.findIndex(x=>x.id===b.id),d=p.direction==='down'?1:-1,j=Math.max(0,Math.min(blocks.length-1,i+d));blocks.splice(j,0,blocks.splice(i,1)[0]);render();return ok('تم الترتيب');case'highlight_element':selectBlock((blockBySelector(sel)||{}).id||selected);return ok('تم التحديد');case'scroll_to_element':(getBySelector(sel)||canvas).scrollIntoView({behavior:'smooth',block:'center'});return ok('تم الانتقال');case'focus_element':selectBlock((blockBySelector(sel)||{}).id||selected);return ok('تم التركيز');case'preview_change':previewSnapshot=snapshot();if(p.tool)return executeTool(p.tool);return ok(p.description||'تم إنشاء معاينة');case'apply_change':previewSnapshot=null;return ok('تم تثبيت التعديل');case'rollback_change':if(previewSnapshot){restore(previewSnapshot);previewSnapshot=null}return ok('تم إلغاء المعاينة');case'reset_section':b=blockBySelector(sel);if(!b)return failSel();Object.assign(b,defaultBlock(b.type),{id:b.id});render();return ok('تمت إعادة القسم');case'split_section':b=blockBySelector(sel);if(!b)return failSel();blocks.push({id:uid(),type:'text',title:b.title+' - جزء',text:b.text||''});render();return ok('تم التقسيم');case'merge_sections':if(blocks.length<2)return ok('لا يوجد ما يكفي للدمج');blocks[0].text=(blocks[0].text||'')+' '+blocks.slice(1).map(x=>x.title+' '+(x.text||'')).join(' ');blocks=blocks.slice(0,1);render();return ok('تم الدمج');case'batch_update':for(const t of (p.tools||[]))await executeTool(t);return ok('تم تنفيذ التحديثات');default:return {success:false,message:'الأداة غير مدعومة'}}}catch(e){console.error(e);return {success:false,error:e.message,message:'فشل التنفيذ: '+e.message}}}function applyInlineStyle(b){setTimeout(()=>{const el=document.querySelector(`.section[data-s3d-id="${b.id}"]`);if(el&&b.style)Object.assign(el.style,b.style)},0)}function ok(message){renderProps();return {success:true,message}}function failSel(){return {success:false,error:'selector_not_found',message:'لم أجد العنصر، اختره من الصفحة ثم أعد الطلب.'}}function saveLocal(){localStorage.setItem('s3d_professional',JSON.stringify(blocks));setStatus('تم الحفظ')}function loadLocal(){const x=localStorage.getItem('s3d_professional');if(x){saveSnapshot('loadLocal');blocks=JSON.parse(x);render();renderProps();setStatus('تم فتح آخر حفظ')}}async function publishPage(){published&&(published.style.display='block',published.textContent='جاري النشر...');try{const html=canvas.innerHTML;const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({html,name:'S3D Screen'})});const data=await res.json();if(data.error)throw new Error(data.error);const url=location.origin+data.url;if(published)published.innerHTML='<a href="'+url+'" target="_blank">'+url+'</a>';navigator.clipboard&&navigator.clipboard.writeText(url);setStatus('تم نسخ الرابط')}catch(e){if(published)published.textContent='فشل النشر: '+e.message;setStatus('فشل النشر')}}function clearAll(){saveSnapshot('clear');blocks=[];selected=null;render();renderProps()}render();renderProps();</script></body></html>
