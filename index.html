<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S3D Interactive Screen Builder</title><style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:#07111f;color:#fff}.wrap{min-height:100vh;display:grid;grid-template-columns:390px 1fr;gap:18px;padding:18px}.panel{background:#111827;border:1px solid #26364f;border-radius:22px;padding:18px}h1{margin:0 0 12px;font-size:24px}textarea,button{width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1px solid #334155;background:#020617;color:#fff}textarea{height:170px;line-height:1.8}button{background:#0ea5e9;font-weight:700;cursor:pointer}.secondary{background:#334155}.hint{color:#94a3b8;font-size:13px;line-height:1.8}.phone{width:390px;max-width:94vw;height:820px;background:#f8fafc;color:#111827;border:12px solid #111827;border-radius:44px;margin:auto;padding:42px 18px 24px;overflow:auto;box-shadow:0 30px 80px #0007}.block{margin:12px 0;border-radius:22px}.hero{padding:24px;background:linear-gradient(135deg,#dbeafe,#bae6fd);border:2px solid #0284c7}.hero h2{margin:0 0 10px;font-size:25px}.hero p{margin:0;line-height:1.8;color:#334155}.card,.tabBox,.accBox,.stepBox,.quizBox{padding:17px;background:#fff;box-shadow:0 10px 26px #0001}.card b{display:block;font-size:18px;margin-bottom:8px}.card p{margin:0;line-height:1.8;color:#475569}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tab{border:0;background:#e2e8f0;color:#0f172a;padding:10px 12px;border-radius:999px;white-space:nowrap}.tab.active{background:#0284c7;color:#fff}.tabContent{background:#f1f5f9;padding:14px;border-radius:16px;line-height:1.8}.accItem{margin:8px 0}.accHead{width:100%;background:#f1f5f9;color:#111827;text-align:right}.accBody{display:none;background:#fff;padding:12px;line-height:1.8;color:#475569}.accItem.open .accBody{display:block}.step{display:none}.step.active{display:block;background:#f1f5f9;padding:16px;border-radius:16px;line-height:1.8}.stepControls{display:flex;gap:8px}.quizOpt{background:#f1f5f9;color:#111827;text-align:right}.quizOpt.good{background:#bbf7d0}.quizOpt.bad{background:#fecaca}.nav{position:sticky;bottom:0;background:#0f172a;color:#fff;display:flex;justify-content:space-around;padding:12px;border-radius:18px}.linkbox{background:#020617;border:1px solid #334155;border-radius:14px;padding:12px;margin-top:10px;word-break:break-all;color:#bae6fd}.selected{outline:3px solid #0284c7}.error{background:#fee2e2;color:#991b1b;padding:14px;border-radius:16px}@media(max-width:900px){.wrap{grid-template-columns:1fr}.phone{height:720px}}</style></head><body><div class="wrap"><section class="panel"><h1>S3D Interactive Builder</h1><p class="hint">هذا الرابط لك للتوليد والتعديل. الزوار يأخذون رابط عرض فقط.</p><textarea id="input" placeholder="اكتب محتوى الشاشة: موضوع، أقسام، أسئلة، خطوات، تفاعل مطلوب"></textarea><button onclick="build()">إنشاء شاشة تفاعلية</button><button class="secondary" onclick="publishPage()">نشر رابط عرض فقط</button><button class="secondary" onclick="downloadHtml()">تحميل HTML</button><div id="published" class="linkbox" style="display:none"></div><p class="hint">اضغط عنصرًا داخل الجوال لتعديل نصه.</p><textarea id="editor" placeholder="اختر عنصرًا لتعديله" oninput="editSelected()"></textarea></section><section><div class="phone" id="screen"><div class="hero block"><h2>جاهز</h2><p>اكتب محتوى الشاشة واضغط إنشاء.</p></div></div></section></div><script>let selected=null;const screenEl=document.getElementById('screen'),inputEl=document.getElementById('input'),editorEl=document.getElementById('editor'),publishedEl=document.getElementById('published');function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function splitItems(s){return String(s||'').split('|').map(x=>x.trim()).filter(Boolean)}function bind(){document.querySelectorAll('.block').forEach(b=>{b.onclick=function(e){if(e.target.closest('button'))return;e.stopPropagation();document.querySelectorAll('.block').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=b;editorEl.value=b.innerText.trim()}})}function editSelected(){if(selected&&!selected.classList.contains('tabBox')&&!selected.classList.contains('accBox')&&!selected.classList.contains('stepBox')&&!selected.classList.contains('quizBox'))selected.innerHTML=safe(editorEl.value).replace(/\n/g,'<br>')}function renderBlock(b,i){let type=b.type||'info',title=safe(b.title||''),content=safe(b.content||''),items=splitItems(b.items);if(type==='hero')return `<div class="block hero"><h2>${title||content}</h2><p>${safe(b.subtitle||'')}</p></div>`;if(type==='tabs')return `<div class="block tabBox"><b>${title||'الأقسام'}</b><div class="tabs">${items.map((x,j)=>`<button class="tab ${j==0?'active':''}" onclick="openTab(this,'tab${i}_${j}')">${safe(x)}</button>`).join('')}</div>${items.map((x,j)=>`<div id="tab${i}_${j}" class="tabContent" style="display:${j==0?'block':'none'}">${safe(x)}: محتوى تفاعلي قابل للقراءة.</div>`).join('')}</div>`;if(type==='accordion')return `<div class="block accBox"><b>${title||'الأسئلة'}</b>${items.map(x=>{let p=x.split(':');return `<div class="accItem"><button class="accHead" onclick="this.parentElement.classList.toggle('open')">${safe(p[0])}</button><div class="accBody">${safe(p.slice(1).join(':')||'تفاصيل إضافية')}</div></div>`}).join('')}</div>`;if(type==='steps')return `<div class="block stepBox"><b>${title||'الخطوات'}</b>${items.map((x,j)=>`<div class="step ${j==0?'active':''}">${j+1}. ${safe(x)}</div>`).join('')}<div class="stepControls"><button onclick="moveStep(this,-1)">السابق</button><button onclick="moveStep(this,1)">التالي</button></div></div>`;if(type==='quiz')return `<div class="block quizBox"><b>${title||'اختبار'}</b><p>${safe(items[0]||content||'اختر الإجابة')}</p>${items.slice(1,3).map((x,j)=>`<button class="quizOpt" onclick="this.classList.add(${j==0?'\'good\'':'\'bad\''})">${safe(x)}</button>`).join('')}</div>`;if(type==='nav')return `<div class="block nav">${items.map(x=>`<span>${safe(x)}</span>`).join('')}</div>`;return `<div class="block card"><b>${title||content}</b><p>${safe(b.text||b.subtitle||'')}</p></div>`}function openTab(btn,id){let box=btn.closest('.tabBox');box.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));box.querySelectorAll('.tabContent').forEach(x=>x.style.display='none');btn.classList.add('active');document.getElementById(id).style.display='block'}function moveStep(btn,dir){let box=btn.closest('.stepBox'),steps=[...box.querySelectorAll('.step')],i=steps.findIndex(s=>s.classList.contains('active'));steps[i].classList.remove('active');steps[(i+dir+steps.length)%steps.length].classList.add('active')}function fallback(){return [{type:'hero',title:'شاشة تفاعلية',subtitle:inputEl.value||'محتوى معلوماتي'}, {type:'tabs',title:'الأقسام',items:'نظرة عامة|التفاصيل|ملاحظات'}, {type:'accordion',title:'أسئلة شائعة',items:'ما الفكرة؟:عرض معلومات بشكل تفاعلي|كيف أستخدمها؟:اضغط على التبويبات والأسئلة'}, {type:'steps',title:'الخطوات',items:'اقرأ المقدمة|افتح الأقسام|اختبر معلوماتك'}, {type:'quiz',title:'اختبار سريع',items:'هل هذه شاشة تفاعلية؟|نعم|لا|نعم'}, {type:'nav',items:'الرئيسية|الأقسام|الأسئلة'}]}async function build(){screenEl.innerHTML='<div class="block card"><b>جاري الإنشاء...</b><p>يتم بناء شاشة تفاعلية.</p></div>';try{let res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:inputEl.value})});let data=await res.json();if(!res.ok||data.error)throw new Error(data.error||'AI error');let blocks=data.blocks&&data.blocks.length?data.blocks:fallback();screenEl.innerHTML=blocks.map(renderBlock).join('');bind()}catch(e){let blocks=fallback();screenEl.innerHTML=blocks.map(renderBlock).join('')+'<div class="error">تنبيه: تم إنشاء نموذج محلي لأن API لم يستجب: '+safe(e.message)+'</div>';bind()}}function publishPage(){let code=btoa(unescape(encodeURIComponent(screenEl.innerHTML)));let url=location.origin+'/view.html#'+code;publishedEl.style.display='block';publishedEl.innerHTML='رابط الزوار:<br><a style="color:#bae6fd" href="'+url+'" target="_blank">'+url+'</a>';navigator.clipboard&&navigator.clipboard.writeText(url)}function downloadHtml(){let html='<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><body>'+screenEl.innerHTML+'</body></html>';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='interactive-screen.html';a.click()}bind()</script></body></html>
