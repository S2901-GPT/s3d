<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>S3D iPhone Dashboard Builder</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Tahoma,Arial,sans-serif;background:#000;color:#fff;overflow-x:hidden}body:before{content:"";position:fixed;inset:-20%;background:radial-gradient(circle at 18% 12%,#60a5fa55,transparent 23%),radial-gradient(circle at 82% 20%,#a78bfa66,transparent 25%),radial-gradient(circle at 50% 85%,#f59e0b44,transparent 32%);filter:blur(38px);z-index:-2}body:after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,#0b1020cc,#000 72%);z-index:-1}.wrap{min-height:100vh;display:grid;grid-template-columns:450px 1fr;gap:30px;padding:24px}.panel{background:rgba(22,22,26,.72);backdrop-filter:blur(28px) saturate(160%);border:1px solid rgba(255,255,255,.14);border-radius:34px;padding:22px;box-shadow:0 40px 120px #000d,inset 0 1px 0 #fff2}.brand{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);padding:9px 14px;border-radius:999px;color:#f5f5f7;font-size:12px;margin-bottom:14px}.dot{width:9px;height:9px;border-radius:50%;background:#34c759;box-shadow:0 0 18px #34c759}h1{margin:0 0 8px;font-size:28px;font-weight:850}.hint{color:#a1a1aa;font-size:13px;line-height:1.8}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-top:12px}.field label{font-size:12px;color:#a1a1aa}.field input,.field textarea,.field select{width:100%;margin-top:7px;padding:13px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(10,10,12,.74);color:#fff;font:inherit}.field textarea{height:82px;resize:vertical;line-height:1.7}.checks{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.check{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;display:flex;gap:9px;align-items:center;color:#f5f5f7;font-size:13px}.check input{width:auto}button{width:100%;margin-top:13px;padding:15px;border-radius:20px;border:0;background:linear-gradient(180deg,#fff,#d7d7dc);font-weight:850;cursor:pointer;color:#000;font:inherit;box-shadow:0 18px 42px rgba(255,255,255,.12)}button:active{transform:scale(.985)}.secondary{background:rgba(255,255,255,.08);color:#f5f5f7;border:1px solid rgba(255,255,255,.12);box-shadow:none}.phoneFrame{display:grid;place-items:center}.phone{width:402px;max-width:94vw;height:842px;background:#000;color:#f5f5f7;border:12px solid #050505;border-radius:60px;margin:auto;padding:16px 14px 18px;overflow:hidden;box-shadow:0 50px 150px #000,0 0 0 1px #ffffff22,0 0 120px #60a5fa22;position:relative}.phone:before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#050505;border-radius:999px;z-index:5}.screenInner{height:100%;overflow:auto;border-radius:48px;padding:54px 14px 86px;background:linear-gradient(180deg,#111827,#030712 40%,#000);scrollbar-width:none}.screenInner::-webkit-scrollbar{display:none}.block{margin:14px 0;border-radius:28px;animation:rise .38s cubic-bezier(.2,.8,.2,1) both}@keyframes rise{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}.hero{padding:26px;background:linear-gradient(145deg,#1d1d22,#3b2f7a 54%,#0a84ff);color:#fff;box-shadow:0 24px 70px #0a84ff44;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.16)}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 15% 10%,#fff5,transparent 30%),linear-gradient(135deg,#fff2,transparent 48%)}.hero h2{margin:0 0 10px;font-size:30px;line-height:1.28;position:relative}.hero p{margin:0;line-height:1.9;color:#e5e7eb;position:relative}.card,.tabBox,.accBox,.stepBox,.quizBox{padding:18px;background:rgba(255,255,255,.095);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 #fff2,0 18px 44px #0006;backdrop-filter:blur(22px) saturate(160%)}.card b,.tabBox>b,.accBox>b,.stepBox>b,.quizBox>b{display:block;font-size:18px;margin-bottom:12px;color:#fff}.card p{margin:0;line-height:1.9;color:#c7c7cc}.tabs{display:flex;gap:9px;overflow:auto;margin-bottom:12px}.tab{border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.08);color:#f5f5f7;padding:10px 14px;border-radius:999px;white-space:nowrap;box-shadow:none;margin:0;width:auto}.tab.active{background:#f5f5f7;color:#000}.tabContent{background:rgba(255,255,255,.06);padding:16px;border-radius:22px;line-height:1.9;color:#d1d5db;border:1px solid rgba(255,255,255,.09)}.accItem{margin:10px 0}.accHead{width:100%;background:rgba(255,255,255,.07);color:#fff;text-align:right;border:1px solid rgba(255,255,255,.1);padding:14px;border-radius:18px;margin:0;box-shadow:none}.accBody{display:none;background:rgba(255,255,255,.05);padding:14px;line-height:1.9;color:#c7c7cc;border-right:4px solid #0a84ff;border-radius:16px;margin-top:8px}.accItem.open .accBody{display:block}.step{display:none}.step.active{display:block;background:rgba(10,132,255,.12);padding:18px;border-radius:22px;line-height:1.9;color:#e5e7eb;border:1px solid rgba(10,132,255,.22)}.stepControls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stepControls button,.quizOpt{margin-top:10px;padding:13px;border-radius:16px;border:0;box-shadow:none}.quizOpt{background:rgba(255,255,255,.08);color:#fff;text-align:right;border:1px solid rgba(255,255,255,.1)}.quizOpt.good{background:#30d15833;color:#d1fadf}.quizOpt.bad{background:#ff453a33;color:#ffe1df}.nav{position:sticky;bottom:0;background:rgba(28,28,30,.82);backdrop-filter:blur(24px);color:#fff;display:flex;justify-content:space-around;padding:14px;border-radius:26px;box-shadow:0 22px 55px #0009;border:1px solid rgba(255,255,255,.12)}.linkbox{background:#050505;border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:14px;margin-top:12px;word-break:break-all;color:#93c5fd}.selected{outline:3px solid #0a84ff}.error{background:#ff453a22;color:#ffd7d5;padding:14px;border-radius:18px}@media(max-width:900px){.wrap{grid-template-columns:1fr;padding:14px}.phone{width:100vw;max-width:100vw;height:100vh;border:0;border-radius:0}.phone:before{display:none}.screenInner{border-radius:0;padding:24px 16px 86px}.panel{order:2}.phoneFrame{order:1}}</style></head><body><div class="wrap"><section class="panel"><span class="brand"><span class="dot"></span>S3D · Dashboard</span><h1>لوحة تحكم الشاشة</h1><p class="hint">اختر ما تريد عرضه، ثم اجعل AI يكتب المحتوى داخل الأقسام التي اخترتها فقط.</p><div class="field"><label>عنوان الشاشة</label><input id="title" value="متلازمة أسبرجر"></div><div class="field"><label>وصف مختصر</label><textarea id="summary">فهم وتوعية حول الحالة بطريقة تفاعلية.</textarea></div><div class="grid"><div class="field"><label>الشكل</label><select id="style"><option>iPhone Dark</option><option>Luxury</option><option>Clean</option></select></div><div class="field"><label>نوع المحتوى</label><select id="tone"><option>تعليمي</option><option>توعوي</option><option>رسمي</option><option>مبسط</option></select></div></div><div class="field"><label>الأقسام المطلوبة</label><input id="sections" value="تعريف، الأعراض، طرق التعامل، التشخيص"></div><div class="checks"><label class="check"><input id="useTabs" type="checkbox" checked> تبويبات</label><label class="check"><input id="useFaq" type="checkbox"> أسئلة</label><label class="check"><input id="useSteps" type="checkbox" checked> خطوات</label><label class="check"><input id="useQuiz" type="checkbox"> اختبار</label><label class="check"><input id="useNav" type="checkbox"> شريط سفلي</label><label class="check"><input id="fullScreen" type="checkbox" checked> ملء الشاشة</label></div><button onclick="build()">إنشاء حسب اختياري</button><button class="secondary" onclick="publishPage()">نشر رابط عرض فقط</button><button class="secondary" onclick="downloadHtml()">تحميل HTML</button><div id="published" class="linkbox" style="display:none"></div><div class="field"><label>تعديل العنصر المحدد</label><textarea id="editor" placeholder="اختر عنصرًا من الشاشة" oninput="editSelected()"></textarea></div></section><section class="phoneFrame"><div class="phone"><div class="screenInner" id="screen"><div class="hero block"><h2>لوحة تحكم جاهزة</h2><p>حدد ما تريد، ثم اضغط إنشاء حسب اختياري.</p></div></div></div></section></div><script>let selected=null;const screenEl=document.getElementById('screen'),editorEl=document.getElementById('editor'),publishedEl=document.getElementById('published');function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function splitItems(s){return String(s||'').split('|').map(x=>x.trim()).filter(Boolean)}function config(){return{title:title.value,summary:summary.value,style:style.value,tone:tone.value,sections:sections.value,useTabs:useTabs.checked,useFaq:useFaq.checked,useSteps:useSteps.checked,useQuiz:useQuiz.checked,useNav:useNav.checked}}function makePrompt(c){return `أنشئ شاشة تفاعلية معلوماتية فقط. العنوان: ${c.title}. الوصف: ${c.summary}. الأسلوب: ${c.tone}. الأقسام: ${c.sections}. العناصر المسموحة فقط: ${c.useTabs?'tabs,':''}${c.useFaq?'accordion,':''}${c.useSteps?'steps,':''}${c.useQuiz?'quiz,':''}${c.useNav?'nav,':''} hero و info. لا تضف أسئلة إذا accordion غير موجود. لا تضف اختبار إذا quiz غير موجود. أرجع JSON حسب schema المتفق عليه.`}function bind(){document.querySelectorAll('.block').forEach(b=>{b.onclick=function(e){if(e.target.closest('button'))return;e.stopPropagation();document.querySelectorAll('.block').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selected=b;editorEl.value=b.innerText.trim();navigator.vibrate&&navigator.vibrate(8)}})}function editSelected(){if(selected&&!selected.classList.contains('tabBox')&&!selected.classList.contains('accBox')&&!selected.classList.contains('stepBox')&&!selected.classList.contains('quizBox'))selected.innerHTML=safe(editorEl.value).replace(/\n/g,'<br>')}function renderBlock(b,i){let type=b.type||'info',title=safe(b.title||''),content=safe(b.content||''),items=splitItems(b.items);if(type==='hero')return `<div class="block hero"><h2>${title||content}</h2><p>${safe(b.subtitle||'')}</p></div>`;if(type==='tabs')return `<div class="block tabBox"><b>${title||'الأقسام'}</b><div class="tabs">${items.map((x,j)=>`<button class="tab ${j==0?'active':''}" onclick="openTab(this,'tab${i}_${j}')">${safe(x)}</button>`).join('')}</div>${items.map((x,j)=>`<div id="tab${i}_${j}" class="tabContent" style="display:${j==0?'block':'none'}">${safe(x)}: محتوى تفاعلي قابل للقراءة.</div>`).join('')}</div>`;if(type==='accordion')return `<div class="block accBox"><b>${title||'الأسئلة'}</b>${items.map(x=>{let p=x.split(':');return `<div class="accItem"><button class="accHead" onclick="this.parentElement.classList.toggle('open')">${safe(p[0])}</button><div class="accBody">${safe(p.slice(1).join(':')||'تفاصيل إضافية')}</div></div>`}).join('')}</div>`;if(type==='steps')return `<div class="block stepBox"><b>${title||'الخطوات'}</b>${items.map((x,j)=>`<div class="step ${j==0?'active':''}">${j+1}. ${safe(x)}</div>`).join('')}<div class="stepControls"><button onclick="moveStep(this,-1)">السابق</button><button onclick="moveStep(this,1)">التالي</button></div></div>`;if(type==='quiz')return `<div class="block quizBox"><b>${title||'اختبار'}</b><p>${safe(items[0]||content||'اختر الإجابة')}</p>${items.slice(1,3).map((x,j)=>`<button class="quizOpt" onclick="this.classList.add(${j==0?'\'good\'':'\'bad\''})">${safe(x)}</button>`).join('')}</div>`;if(type==='nav')return `<div class="block nav">${items.map(x=>`<span>${safe(x)}</span>`).join('')}</div>`;return `<div class="block card"><b>${title||content}</b><p>${safe(b.text||b.subtitle||'')}</p></div>`}function openTab(btn,id){let box=btn.closest('.tabBox');box.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));box.querySelectorAll('.tabContent').forEach(x=>x.style.display='none');btn.classList.add('active');document.getElementById(id).style.display='block'}function moveStep(btn,dir){let box=btn.closest('.stepBox'),steps=[...box.querySelectorAll('.step')],i=steps.findIndex(s=>s.classList.contains('active'));steps[i].classList.remove('active');steps[(i+dir+steps.length)%steps.length].classList.add('active')}function fallback(c){let arr=[{type:'hero',title:c.title,subtitle:c.summary},{type:'info',title:'معلومات أساسية',text:c.sections}];if(c.useTabs)arr.push({type:'tabs',title:'الأقسام',items:c.sections.replaceAll('،','|')});if(c.useFaq)arr.push({type:'accordion',title:'أسئلة',items:'ما الهدف؟:عرض معلومات بشكل تفاعلي|كيف أستخدم الشاشة؟:اضغط العناصر للتنقل'});if(c.useSteps)arr.push({type:'steps',title:'الخطوات',items:'اقرأ المقدمة|افتح الأقسام|راجع المعلومات'});if(c.useQuiz)arr.push({type:'quiz',title:'اختبار سريع',items:'هل المحتوى تفاعلي؟|نعم|لا|نعم'});if(c.useNav)arr.push({type:'nav',items:'الرئيسية|المعلومات|النهاية'});return arr}async function build(){let c=config();screenEl.innerHTML='<div class="block card"><b>جاري الإنشاء...</b><p>يتم بناء الشاشة حسب اختياراتك.</p></div>';try{let res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:makePrompt(c)})});let data=await res.json();if(!res.ok||data.error)throw new Error(data.error||'AI error');let blocks=(data.blocks||[]).filter(b=>(b.type==='accordion'?c.useFaq:true)&&(b.type==='quiz'?c.useQuiz:true)&&(b.type==='steps'?c.useSteps:true)&&(b.type==='tabs'?c.useTabs:true)&&(b.type==='nav'?c.useNav:true));if(!blocks.length)blocks=fallback(c);screenEl.innerHTML=blocks.map(renderBlock).join('');bind()}catch(e){screenEl.innerHTML=fallback(c).map(renderBlock).join('')+'<div class="error">تنبيه: تم إنشاء نموذج محلي لأن API لم يستجب: '+safe(e.message)+'</div>';bind()}}function publishPage(){let code=btoa(unescape(encodeURIComponent(screenEl.innerHTML)));let url=location.origin+'/view.html#'+code;publishedEl.style.display='block';publishedEl.innerHTML='رابط الزوار:<br><a style="color:#93c5fd" href="'+url+'" target="_blank">'+url+'</a>';navigator.clipboard&&navigator.clipboard.writeText(url)}function downloadHtml(){let html='<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><body>'+screenEl.innerHTML+'</body></html>';let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='interactive-screen.html';a.click()}bind()</script></body></html>
