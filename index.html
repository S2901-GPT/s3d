<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>S3D Professional Builder</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Tahoma,sans-serif;background:#050507;color:#fff}.app{height:100vh;display:grid;grid-template-columns:310px 1fr 340px}.side,.props{background:#101014;border-left:1px solid #27272a;padding:18px;overflow:auto}.props{border-right:1px solid #27272a;border-left:0}.brand{font-weight:900;font-size:22px}.muted{color:#a1a1aa;font-size:13px;line-height:1.7}.btn{width:100%;border:0;border-radius:16px;padding:13px;margin-top:10px;background:#f5f5f7;color:#000;font-weight:800}.btn2{background:#232329;color:#fff;border:1px solid #3f3f46}.danger{background:#7f1d1d;color:#fee2e2}.group{margin-top:18px}.blockBtn{display:flex;justify-content:space-between;align-items:center;background:#18181b;border:1px solid #2f2f35;border-radius:16px;padding:13px;margin-top:8px;cursor:pointer}.canvasWrap{height:100vh;overflow:auto;background:radial-gradient(circle at top,#1f2937,#020617 55%);padding:28px;display:flex;justify-content:center}.canvas{width:min(430px,100%);min-height:100%;background:#0b0b0f;border-radius:36px;padding:18px;color:#fff;box-shadow:0 40px 120px #000}.section{position:relative;border:1px solid transparent;border-radius:26px;margin:14px 0;padding:18px;background:#16161a;cursor:grab}.section.selected{border-color:#0a84ff;box-shadow:0 0 0 3px #0a84ff33}.section.dragging{opacity:.45}.hero{background:linear-gradient(145deg,#111827,#3b2f7a,#0a84ff);padding:30px}.hero h1{font-size:34px;margin:0 0 12px}.text h2,.image h2,.cards h2,.steps h2{margin:0 0 10px}.text p,.hero p,.cards p,.steps p{color:#d1d5db;line-height:1.8}.imageBox{height:190px;border-radius:22px;background:linear-gradient(135deg,#334155,#111827);display:grid;place-items:center;color:#cbd5e1}.cardsGrid{display:grid;gap:10px}.card{background:#ffffff12;border:1px solid #ffffff18;border-radius:20px;padding:14px}.stepsList{display:grid;gap:10px}.step{background:#0a84ff22;border:1px solid #0a84ff44;border-radius:18px;padding:14px}.field{margin-top:12px}.field label{display:block;color:#a1a1aa;font-size:12px;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;border:1px solid #3f3f46;border-radius:14px;background:#09090b;color:#fff;padding:12px;font:inherit}.field textarea{min-height:90px}.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:8px}.link{word-break:break-all;background:#09090b;border:1px solid #333;border-radius:14px;padding:12px;color:#93c5fd;margin-top:10px}@media(max-width:900px){.app{grid-template-columns:1fr}.side,.props{height:auto}.canvasWrap{height:auto;min-height:100vh;padding:0}.canvas{width:100%;border-radius:0;min-height:100vh}}</style></head><body><div class="app"><aside class="side"><div class="brand">S3D Builder</div><p class="muted">Builder احترافي: أضف عناصر، عدّل خصائص، اسحب الترتيب، ثم انشر رابط حقيقي.</p><div class="group"><b>إضافة عنصر</b><div class="blockBtn" onclick="addBlock('hero')"><span>Hero</span><span>+</span></div><div class="blockBtn" onclick="addBlock('text')"><span>نص</span><span>+</span></div><div class="blockBtn" onclick="addBlock('cards')"><span>بطاقات</span><span>+</span></div><div class="blockBtn" onclick="addBlock('steps')"><span>خطوات</span><span>+</span></div><div class="blockBtn" onclick="addBlock('image')"><span>صورة/غلاف</span><span>+</span></div></div><div class="group"><button class="btn" onclick="askAI()">AI يعبّي المحتوى</button><button class="btn btn2" onclick="saveLocal()">حفظ محلي</button><button class="btn btn2" onclick="loadLocal()">فتح آخر حفظ</button><button class="btn" onclick="publishPage()">نشر رابط حقيقي</button><button class="btn btn2" onclick="downloadHtml()">تحميل HTML</button><button class="btn danger" onclick="clearAll()">مسح الكل</button><div id="published" class="link" style="display:none"></div></div></aside><main class="canvasWrap"><section id="canvas" class="canvas"></section></main><aside class="props"><b>خصائص العنصر</b><p class="muted">اختر عنصر من الشاشة لتعديله.</p><div id="props"></div></aside></div><script>let blocks=[{id:uid(),type:'hero',title:'عنوان الشاشة',text:'وصف قصير يظهر هنا.'},{id:uid(),type:'text',title:'معلومات أساسية',text:'اكتب المحتوى الرئيسي هنا.'}],selected=null,dragId=null;const canvas=document.getElementById('canvas'),props=document.getElementById('props'),published=document.getElementById('published');function uid(){return 'b'+Math.random().toString(36).slice(2,9)}function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function addBlock(type){const base={id:uid(),type,title:'عنوان',text:'محتوى'};if(type==='hero'){base.title='عنوان رئيسي';base.text='وصف جذاب ومختصر'}if(type==='cards'){base.title='بطاقات معلومات';base.items='بطاقة أولى:شرح مختصر|بطاقة ثانية:شرح مختصر|بطاقة ثالثة:شرح مختصر'}if(type==='steps'){base.title='خطوات';base.items='الخطوة الأولى|الخطوة الثانية|الخطوة الثالثة'}if(type==='image'){base.title='غلاف بصري';base.text='مساحة صورة أو غلاف'}blocks.push(base);render()}function render(){canvas.innerHTML=blocks.map(blockHtml).join('');bind()}function blockHtml(b){const sel=b.id===selected?' selected':'';if(b.type==='hero')return `<div class="section hero${sel}" draggable="true" data-id="${b.id}"><h1>${safe(b.title)}</h1><p>${safe(b.text)}</p></div>`;if(b.type==='cards')return `<div class="section cards${sel}" draggable="true" data-id="${b.id}"><h2>${safe(b.title)}</h2><div class="cardsGrid">${String(b.items||'').split('|').map(x=>{let p=x.split(':');return `<div class="card"><b>${safe(p[0])}</b><p>${safe(p.slice(1).join(':'))}</p></div>`}).join('')}</div></div>`;if(b.type==='steps')return `<div class="section steps${sel}" draggable="true" data-id="${b.id}"><h2>${safe(b.title)}</h2><div class="stepsList">${String(b.items||'').split('|').map((x,i)=>`<div class="step">${i+1}. ${safe(x)}</div>`).join('')}</div></div>`;if(b.type==='image')return `<div class="section image${sel}" draggable="true" data-id="${b.id}"><h2>${safe(b.title)}</h2><div class="imageBox">${safe(b.text)}</div></div>`;return `<div class="section text${sel}" draggable="true" data-id="${b.id}"><h2>${safe(b.title)}</h2><p>${safe(b.text)}</p></div>`}function bind(){document.querySelectorAll('.section').forEach(el=>{el.onclick=()=>selectBlock(el.dataset.id);el.ondragstart=()=>{dragId=el.dataset.id;el.classList.add('dragging')};el.ondragend=()=>el.classList.remove('dragging');el.ondragover=e=>e.preventDefault();el.ondrop=e=>{e.preventDefault();moveBlock(dragId,el.dataset.id)}})}function selectBlock(id){selected=id;render();renderProps()}function renderProps(){const b=blocks.find(x=>x.id===selected);if(!b){props.innerHTML='<p class="muted">لا يوجد عنصر محدد.</p>';return}props.innerHTML=`<div class="field"><label>النوع</label><input value="${safe(b.type)}" disabled></div><div class="field"><label>العنوان</label><input id="pTitle" value="${safe(b.title)}" oninput="updateProp('title',this.value)"></div><div class="field"><label>النص</label><textarea id="pText" oninput="updateProp('text',this.value)">${safe(b.text)}</textarea></div>${(b.type==='cards'||b.type==='steps')?`<div class="field"><label>العناصر افصل بينها بـ |</label><textarea oninput="updateProp('items',this.value)">${safe(b.items)}</textarea></div>`:''}<div class="toolbar"><button class="btn btn2" onclick="duplicateBlock()">نسخ</button><button class="btn danger" onclick="deleteBlock()">حذف</button></div>`}function updateProp(k,v){const b=blocks.find(x=>x.id===selected);if(b){b[k]=v;render()}}function deleteBlock(){blocks=blocks.filter(x=>x.id!==selected);selected=null;render();renderProps()}function duplicateBlock(){const b=blocks.find(x=>x.id===selected);if(b){blocks.push({...b,id:uid(),title:b.title+' نسخة'});render()}}function moveBlock(from,to){if(!from||!to||from===to)return;const a=blocks.findIndex(x=>x.id===from),b=blocks.findIndex(x=>x.id===to);const item=blocks.splice(a,1)[0];blocks.splice(b,0,item);render()}async function askAI(){const topic=prompt('ما موضوع الشاشة؟');if(!topic)return;try{const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:'أنشئ محتوى شاشة احترافية عن: '+topic+' بصيغة blocks: hero,text,cards,steps'})});const data=await res.json();if(data.blocks?.length){blocks=data.blocks.map(x=>({id:uid(),type:x.type==='info'?'text':x.type,title:x.title||x.content||'عنوان',text:x.text||x.subtitle||'',items:x.items||''}));render()}}catch(e){alert('فشل AI')}}function saveLocal(){localStorage.setItem('s3d_professional',JSON.stringify(blocks));alert('تم الحفظ')}function loadLocal(){const x=localStorage.getItem('s3d_professional');if(x){blocks=JSON.parse(x);render()}}async function publishPage(){published.style.display='block';published.textContent='جاري النشر...';try{const html=canvas.innerHTML;const res=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({html,name:'S3D Screen'})});const data=await res.json();if(data.error)throw new Error(data.error);const url=location.origin+data.url;published.innerHTML='<a href="'+url+'" target="_blank">'+url+'</a>';navigator.clipboard&&navigator.clipboard.writeText(url)}catch(e){published.textContent='فشل النشر: '+e.message}}function downloadHtml(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([canvas.innerHTML],{type:'text/html'}));a.download='s3d-screen.html';a.click()}function clearAll(){blocks=[];selected=null;render();renderProps()}render();renderProps()</script></body></html>
