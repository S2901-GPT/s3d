<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S3D AI Designer</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:#07111f;color:#fff}.wrap{min-height:100vh;display:grid;grid-template-columns:390px 1fr;gap:18px;padding:18px}.panel{background:#111827;border:1px solid #26364f;border-radius:22px;padding:18px}h1{margin:0 0 12px;font-size:24px}textarea,button{width:100%;margin-top:10px;padding:14px;border-radius:14px;border:1px solid #334155;background:#020617;color:#fff}textarea{height:180px;line-height:1.8}button{background:#0ea5e9;font-weight:700;cursor:pointer}.hint{color:#94a3b8;font-size:13px;line-height:1.8}.phone{width:390px;max-width:94vw;min-height:820px;background:#f8fafc;color:#111827;border:12px solid #111827;border-radius:44px;margin:auto;padding:48px 18px 24px;overflow:auto;box-shadow:0 30px 80px #0007}.block{margin:12px 0;border-radius:22px}.hero{padding:26px;background:linear-gradient(135deg,#dbeafe,#bae6fd);box-shadow:0 14px 35px #0284c722}.hero h2{margin:0 0 10px;font-size:26px}.hero p{margin:0;color:#334155;line-height:1.8}.card{padding:18px;background:#fff;box-shadow:0 10px 30px #00000018}.card b{display:block;font-size:18px;margin-bottom:8px}.card p{margin:0;color:#475569;line-height:1.8}.stat{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat .item{background:#fff;padding:16px;border-radius:20px;text-align:center;box-shadow:0 8px 22px #0001}.stat strong{display:block;font-size:22px;color:#0284c7}.list{background:#fff;padding:18px;box-shadow:0 8px 22px #0001}.list ul{margin:0;padding-right:18px;line-height:2}.btn{background:#0284c7;color:white;text-align:center;padding:16px;font-weight:700;box-shadow:0 12px 26px #0284c744}.footer{background:#0f172a;color:#fff;padding:14px;text-align:center}.error{background:#fee2e2;color:#991b1b;padding:14px;border-radius:16px}@media(max-width:900px){.wrap{grid-template-columns:1fr}.phone{min-height:720px}}
</style>
</head>
<body>
<div class="wrap">
<section class="panel"><h1>S3D AI Designer</h1><p class="hint">اكتب وصف الخدمة أو المشروع بالعربي. الذكاء يصمم صفحة عرض كاملة داخل الجوال.</p><textarea id="input" placeholder="مثال: شركة تنظيف في قطر، خدمة 24 ساعة، أسعار تبدأ من 50 ريال، فريق محترف، تواصل واتساب"></textarea><button onclick="build()">صمّم الصفحة</button></section>
<section><div class="phone" id="screen"><div class="hero block"><h2>جاهز للتصميم</h2><p>اكتب وصفك واضغط صمّم الصفحة.</p></div></div></section>
</div>
<script>
function safe(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function renderBlock(b){const type=b.type||'card';const content=safe(b.content||'');const title=safe(b.title||'');if(type==='hero')return `<div class="block hero"><h2>${title||content}</h2><p>${safe(b.subtitle||'')}</p></div>`;if(type==='stat')return `<div class="block stat"><div class="item"><strong>${content}</strong><span>${title||'معلومة'}</span></div><div class="item"><strong>${safe(b.value2||'24/7')}</strong><span>${safe(b.label2||'دعم')}</span></div></div>`;if(type==='list')return `<div class="block list"><b>${title||'المميزات'}</b><ul>${String(b.items||content).split('|').map(x=>`<li>${safe(x)}</li>`).join('')}</ul></div>`;if(type==='button'||type==='btn')return `<div class="block btn">${content||'تواصل الآن'}</div>`;if(type==='footer')return `<div class="block footer">${content}</div>`;return `<div class="block card"><b>${title||content}</b><p>${safe(b.text||b.subtitle||'')}</p></div>`}
async function build(){const prompt=document.getElementById('input').value;const screen=document.getElementById('screen');screen.innerHTML='<div class="block card"><b>جاري التصميم...</b><p>يتم بناء واجهة منسقة الآن.</p></div>';try{const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});const data=await res.json();if(!res.ok||data.error)throw new Error(data.error||'AI error');screen.innerHTML=(data.blocks||[]).map(renderBlock).join('')}catch(e){screen.innerHTML='<div class="error">حدث خطأ: '+safe(e.message)+'</div>'}}
</script>
</body>
</html>
