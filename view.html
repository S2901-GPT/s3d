<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>S3D View</title><style>*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Tahoma,sans-serif;background:radial-gradient(circle at top,#1f2937,#020617 55%);color:#fff;min-height:100vh;display:flex;justify-content:center}.canvas{width:min(430px,100%);min-height:100vh;background:#0b0b0f;padding:18px;color:#fff}.section{border-radius:26px;margin:14px 0;padding:18px;background:#16161a}.hero{background:linear-gradient(145deg,#111827,#3b2f7a,#0a84ff);padding:30px}.hero h1{font-size:34px;margin:0 0 12px}.text h2,.image h2,.cards h2,.steps h2{margin:0 0 10px}.text p,.hero p,.cards p,.steps p{color:#d1d5db;line-height:1.8}.imageBox{height:190px;border-radius:22px;background:linear-gradient(135deg,#334155,#111827);display:grid;place-items:center;color:#cbd5e1}.cardsGrid{display:grid;gap:10px}.card{background:#ffffff12;border:1px solid #ffffff18;border-radius:20px;padding:14px}.stepsList{display:grid;gap:10px}.step{background:#0a84ff22;border:1px solid #0a84ff44;border-radius:18px;padding:14px}.msg{padding:18px;color:#fff}</style></head><body><main id="app" class="canvas"><div class="msg">جاري التحميل...</div></main><script>async function load(){var app=document.getElementById('app');var id=new URLSearchParams(location.search).get('id');if(!id){app.innerHTML='<div class="msg">No id</div>';return}try{var r=await fetch('/api/load?id='+encodeURIComponent(id));var j=await r.json();if(j.error)throw new Error(j.error);app.innerHTML=j.html||'<div class="msg">No content</div>'}catch(e){app.innerHTML='<div class="msg">Error: '+String(e.message||e)+'</div>'}}load()</script></body></html>
