<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S3D Viewer</title><style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:#07111f;color:#111827;min-height:100vh;display:grid;place-items:center;padding:16px}.phone{width:390px;max-width:96vw;height:820px;background:#f8fafc;border:12px solid #111827;border-radius:44px;padding:42px 18px 24px;overflow:auto;box-shadow:0 30px 80px #0007}.block{margin:12px 0;border-radius:22px}.hero{padding:24px;background:linear-gradient(135deg,#dbeafe,#bae6fd);border:2px solid #0284c7}.hero h2{margin:0 0 10px;font-size:25px}.hero p{margin:0;line-height:1.8;color:#334155}.card,.tabBox,.accBox,.stepBox,.quizBox{padding:17px;background:#fff;box-shadow:0 10px 26px #0001}.card b{display:block;font-size:18px;margin-bottom:8px}.card p{margin:0;line-height:1.8;color:#475569}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.tab{border:0;background:#e2e8f0;color:#0f172a;padding:10px 12px;border-radius:999px;white-space:nowrap}.tab.active{background:#0284c7;color:#fff}.tabContent{background:#f1f5f9;padding:14px;border-radius:16px;line-height:1.8}.accItem{margin:8px 0}.accHead{width:100%;background:#f1f5f9;color:#111827;text-align:right;border:0;padding:12px;border-radius:12px}.accBody{display:none;background:#fff;padding:12px;line-height:1.8;color:#475569}.accItem.open .accBody{display:block}.step{display:none}.step.active{display:block;background:#f1f5f9;padding:16px;border-radius:16px;line-height:1.8}.stepControls{display:flex;gap:8px}.stepControls button,.quizOpt{width:100%;margin-top:10px;padding:12px;border-radius:12px;border:0}.quizOpt{background:#f1f5f9;color:#111827;text-align:right}.quizOpt.good{background:#bbf7d0}.quizOpt.bad{background:#fecaca}.nav{position:sticky;bottom:0;background:#0f172a;color:#fff;display:flex;justify-content:space-around;padding:12px;border-radius:18px}.empty{background:#fee2e2;color:#991b1b;padding:16px;border-radius:18px}</style></head><body><main class="phone" id="app"></main><script>const app=document.getElementById('app');function openTab(btn,id){let box=btn.closest('.tabBox');box.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));box.querySelectorAll('.tabContent').forEach(x=>x.style.display='none');btn.classList.add('active');document.getElementById(id).style.display='block'}function moveStep(btn,dir){let box=btn.closest('.stepBox'),steps=[...box.querySelectorAll('.step')],i=steps.findIndex(s=>s.classList.contains('active'));steps[i].classList.remove('active');steps[(i+dir+steps.length)%steps.length].classList.add('active')}try{const code=location.hash.slice(1);if(!code)throw new Error('لا يوجد محتوى للعرض');app.innerHTML=decodeURIComponent(escape(atob(code)))}catch(e){app.innerHTML='<div class="empty">الرابط غير صالح أو ناقص. أنشئ رابطًا جديدًا من زر نشر رابط عرض فقط.</div>'}</script></body></html>
