<!doctype html>
<html lang="ar" dir="rtl">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>View</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:#fff;
}
</style>

<div id="app">جاري التحميل...</div>

<script>
async function load(){
  const id = new URLSearchParams(location.search).get('id')

  if(!id){
    document.getElementById('app').innerText='No id'
    return
  }

  try{
    const r = await fetch('/api/load?id='+id)
    const j = await r.json()

    if(j.error) throw new Error(j.error)

    document.getElementById('app').innerHTML = j.html || 'No content'

  }catch(e){
    document.getElementById('app').innerText = 'Error: ' + e.message
  }
}

load()
</script>
</html>
