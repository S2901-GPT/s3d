<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض المحتوى - S3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-white min-h-screen">
    <div id="viewer" class="max-w-3xl mx-auto p-10 pt-20">
        <div class="animate-pulse text-center text-slate-300">جاري تحميل التجربة التفاعلية...</div>
    </div>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        if(id) {
            fetch('/api/load?id=' + id)
                .then(r => r.json())
                .then(d => {
                    document.getElementById('viewer').innerHTML = d.html || '<p class="text-center">الصفحة غير موجودة.</p>';
                });
        }
    </script>
</body>
</html>
