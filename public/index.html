<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3D AI Builder PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">
<header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-20">
<div class="flex items-center gap-2">
<span class="font-black text-slate-800 text-xl tracking-tight">S3D <span class="text-teal-600 font-medium text-sm">PRO BUILDER</span></span>
</div>
<button id="publishBtn" onclick="save()" class="bg-teal-600 text-white px-8 py-2 rounded-full font-bold">نشر الصفحة</button>
</header>

<main class="flex flex-grow overflow-hidden">
<div class="flex-grow p-10 overflow-y-auto bg-slate-100">
<div id="canvas-root" class="max-w-3xl mx-auto min-h-[85vh] bg-white p-12 rounded-[2.5rem] shadow-2xl border border-white"></div>
</div>

<aside class="w-[350px] bg-white border-r flex flex-col shadow-2xl z-10">
<div class="p-5 border-b bg-slate-50 flex items-center justify-between"><span class="font-bold text-slate-700">مساعد الذكاء الاصطناعي</span></div>
<div id="chat" class="flex-grow overflow-y-auto p-5 text-sm space-y-4">
<div class="bg-teal-50 p-4 rounded-2xl">مرحباً! يمكنني الآن تعديل الصفحة بالكامل.</div>
</div>
<div class="p-5 border-t bg-white">
<textarea id="inp" class="w-full p-4 border rounded-2xl" rows="3"></textarea>
<button onclick="ask()" class="w-full mt-3 bg-slate-900 text-white py-4 rounded-2xl">إرسال</button>
</div>
</aside>
</main>

<script src="js/ai-tools.js"></script>
<script>
let conversationHistory = [];

async function ask() {
const btn = event.target;
const inp = document.getElementById('inp');
const chat = document.getElementById('chat');
const canvasHtml = document.getElementById('canvas-root').innerHTML;
if(!inp.value.trim()) return;
const userMsg = inp.value;
conversationHistory.push({ role: "user", content: userMsg });
btn.disabled = true; btn.innerText = "جاري التفكير...";
chat.innerHTML += `<div>${userMsg}</div>`;
inp.value = '';

try {
const res = await fetch('/api/chat', {
method:'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ messages: conversationHistory, currentHtml: canvasHtml })
});
const data = await res.json();
if(res.ok) {
if(data.tool_calls) {
data.tool_calls.forEach(c => {
const args = JSON.parse(c.function.arguments);
if (c.function.name === 'create_component') {
const componentData = args.data ? args.data : args;
S3D_Engine.create_component(args.type, componentData);
} else if (c.function.name === 'update_page_html') {
S3D_Engine.update_page_html(args);
} else if (c.function.name === 'inject_custom_html') {
S3D_Engine.inject_custom_html(args);
}
});
}
const aiReply = data.reply || 'تم التنفيذ';
chat.innerHTML += `<div>${aiReply}</div>`;
conversationHistory.push({ role: "assistant", content: aiReply });
}
} catch(e) {
chat.innerHTML += `<div>خطأ</div>`;
} finally {
btn.disabled = false; btn.innerText = "إرسال";
}
}
</script>
</body>
</html>
