<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3D AI Builder PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden">
    <header class="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm z-20">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white font-black">S3</div>
            <span class="font-black text-slate-800 text-xl tracking-tight">S3D <span class="text-teal-600 font-medium text-sm">PRO BUILDER</span></span>
        </div>
        <button onclick="save()" class="bg-teal-600 text-white px-8 py-2 rounded-full font-bold hover:bg-teal-700 transition-all shadow-lg hover:shadow-teal-200">نشر الصفحة</button>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <div class="flex-grow p-10 overflow-y-auto bg-slate-100">
            <div id="canvas-root" class="max-w-3xl mx-auto min-h-[85vh] bg-white p-12 rounded-[2.5rem] shadow-2xl border border-white"></div>
        </div>

        <aside class="w-[350px] bg-white border-r flex flex-col shadow-2xl z-10">
            <div class="p-5 border-b bg-slate-50 flex items-center justify-between">
                <span class="font-bold text-slate-700">مساعد الذكاء الاصطناعي</span>
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
            </div>
            <div id="chat" class="flex-grow overflow-y-auto p-5 text-sm space-y-4">
                <div class="bg-teal-50 p-4 rounded-2xl rounded-tr-none text-teal-900 border border-teal-100">مرحباً! أنا جاهز لبناء محتواك التفاعلي. اطلب مني بناء قسم معين.</div>
            </div>
            <div class="p-5 border-t bg-white">
                <textarea id="inp" class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-teal-500 outline-none text-sm resize-none transition-all shadow-inner" rows="3" placeholder="مثلاً: أضف خيارات تفاعلية عن أنواع الأعصاب..."></textarea>
                <button onclick="ask()" class="w-full mt-3 bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg active:scale-[0.98]">إرسال الأمر</button>
            </div>
        </aside>
    </main>

    <script src="js/ai-tools.js"></script>
    <script>
        let conversationHistory = [];
        async function ask() {
            const btn = event.target;
            const inp = document.getElementById('inp');
            const chat = document.getElementById('chat');
            if(!inp.value.trim()) return;
            const userMsg = inp.value;
            conversationHistory.push({ role: "user", content: userMsg });
            btn.disabled = true; btn.innerText = "جاري البناء...";
            chat.innerHTML += `<div class="bg-slate-100 p-4 rounded-2xl rounded-tl-none text-slate-700 self-end">${userMsg}</div>`;
            inp.value = '';
            chat.scrollTop = chat.scrollHeight;
            try {
                const res = await fetch('/api/chat', { method:'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ messages: conversationHistory }) });
                const data = await res.json();
                if(res.ok) {
                    if(data.tool_calls) {
                        data.tool_calls.forEach(c => {
                            const args = JSON.parse(c.function.arguments);
                            S3D_Engine.create_component(args.type, args.data);
                        });
                    }
                    const aiReply = data.reply || 'تم تنفيذ طلبك وبناء القسم بنجاح!';
                    chat.innerHTML += `<div class="bg-teal-50 p-4 rounded-2xl rounded-tr-none text-teal-900 border border-teal-100 animate-fade-in">${aiReply}</div>`;
                    conversationHistory.push({ role: "assistant", content: aiReply });
                } else {
                    chat.innerHTML += `<div class="bg-red-50 p-4 rounded-2xl text-red-600 border border-red-100 italic font-bold">خطأ من الخادم: ${data.error || 'حدث خطأ غير معروف'}</div>`;
                }
            } catch(e) {
                chat.innerHTML += `<div class="bg-red-50 p-4 rounded-2xl text-red-600 border border-red-100 italic font-bold">مشكلة في الاتصال: ${e.message}</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "إرسال الأمر";
                chat.scrollTop = chat.scrollHeight;
            }
        }
        async function save() {
            const html = document.getElementById('canvas-root').innerHTML;
            if(!html) return alert("الصفحة فارغة!");
            const res = await fetch('/api/save', { method:'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ html }) });
            const d = await res.json();
            if(res.ok) window.open('/view.html?id=' + d.id, '_blank');
            else alert("حدث خطأ أثناء الحفظ.");
        }
    </script>
</body>
</html>
